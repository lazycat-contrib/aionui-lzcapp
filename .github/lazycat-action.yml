version: 1
project:
  root: .
  build_config: lzc-build.yml
  package_file: package.yml
  output: dist/aionui.lpk
update:
  strategy: publish
  allow_downgrade: false
  version_source:
    type: git
build:
  run_buildscript: false
stores:
  official:
    enabled: false
  private:
    enabled: true
    skip_if_version_exists: true
    name: AionUi
    summary: 内置 Agent 引擎、开箱即用的 AI 协作界面
